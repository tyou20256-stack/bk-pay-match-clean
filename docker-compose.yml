version: "3.8"

services:
  app:
    build: .
    container_name: bk-pay-match
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3003}:3003"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - signer-net
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - app-backups:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health',{headers:{'X-Forwarded-Proto':'https'}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M

  # Hot wallet signer worker (security-critical, optional)
  # Enabled only with the "signer" profile and when the main app has
  # ENABLE_JOB_QUEUE=true and ENABLE_SIGNER_WORKER=true.
  #
  # Start:
  #   docker compose --profile signer up -d signer
  #
  # Security properties:
  #   - Separate container = separate memory space from the Puppeteer/
  #     Express app. An RCE in the main app cannot read this process's
  #     TRON_WALLET_PRIVATE_KEY.
  #   - No public ports. Communicates only via the shared Redis network.
  #   - Read-only root filesystem (except /tmp).
  #   - Drops all Linux capabilities.
  #   - Reuses the main app's Docker image but runs a different entrypoint
  #     (dist/workers/signer.js). No Puppeteer/Chromium in memory.
  #
  # Required env_file keys for THIS container only:
  #   TRON_WALLET_PRIVATE_KEY=<hex>
  #   TRONGRID_API_KEY=<optional>
  #   REDIS_URL=redis://redis:6379
  #   BK_ENC_KEY=<required by shared modules, can be any 32 chars>
  #
  # To revoke signing capability: `docker compose stop signer`. The main
  # app will enqueue jobs that will stall until the signer is restarted;
  # alternatively set ENABLE_SIGNER_WORKER=false and restart the main
  # app to fall back to the synchronous sendUSDT path.
  signer:
    profiles: ["signer"]
    build: .
    container_name: bk-pay-match-signer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - ENABLE_JOB_QUEUE=true
      - ENABLE_SIGNER_WORKER=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - signer-net
    volumes:
      # Shares only the DB volume (read-only) so the signer can use
      # better-sqlite3 init code without a writable mount. The signer
      # does not write to the DB directly; audit logging happens via
      # the main app after tx confirmation.
      - app-data:/app/data:ro
      - app-logs:/app/logs
    # Override the default Dockerfile CMD (main app) with the signer
    # entrypoint. The image layout keeps both compiled modules under
    # dist/ so no separate Dockerfile is needed.
    command: ["node", "dist/workers/signer.js"]
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Signer has no HTTP endpoint; we use a BullMQ ping via Redis.
      # If Redis is reachable AND the signer has not exited, we're healthy.
      test: ["CMD", "node", "-e", "const IORedis = require('ioredis'); const r = new IORedis(process.env.REDIS_URL, { maxRetriesPerRequest: 1, enableReadyCheck: false }); r.ping().then(() => { r.quit(); process.exit(0); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Puppeteer worker (optional — start with: docker compose --profile puppeteer up -d)
  puppeteer:
    profiles: ["puppeteer"]
    build:
      context: .
      dockerfile: Dockerfile.puppeteer
    container_name: bk-pay-match-puppeteer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PUPPETEER_MODE=worker
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: bk-pay-match-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    networks:
      - signer-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # SQLite backup sidecar — hourly local + daily off-host (RPO < 1h)
  backup:
    image: alpine:3
    container_name: bk-pay-match-backup
    restart: unless-stopped
    volumes:
      - app-data:/data:ro
      - app-backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'apk add --no-cache sqlite rclone && while true; do
        FNAME="bkpay_$$(date +%Y%m%d_%H%M%S).db";
        sqlite3 /data/bkpay.db ".backup /backups/$$FNAME";
        echo "[backup] $$(date) — local $$FNAME done";
        if [ -f /backups/rclone.conf ]; then
          rclone --config /backups/rclone.conf copy "/backups/$$FNAME" remote:bk-pay-match-backups/ 2>&1 || echo "[backup] rclone failed";
        fi;
        find /backups -name "bkpay_*.db" -mtime +7 -delete 2>/dev/null;
        sleep 3600;
      done'

networks:
  default:
    driver: bridge
  # Internal-only network isolating the signer + Redis from egress.
  # The signer container has no route to the public internet from this
  # network, preventing private-key exfiltration even if compromised.
  signer-net:
    driver: bridge
    internal: true

volumes:
  app-data:
  app-logs:
  app-backups:
  redis-data:
