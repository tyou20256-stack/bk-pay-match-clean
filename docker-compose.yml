version: "3.8"

services:
  app:
    build: .
    container_name: bk-pay-match
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3003}:3003"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - app-backups:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health',{headers:{'X-Forwarded-Proto':'https'}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M

  # Puppeteer worker (optional — start with: docker compose --profile puppeteer up -d)
  puppeteer:
    profiles: ["puppeteer"]
    build:
      context: .
      dockerfile: Dockerfile.puppeteer
    container_name: bk-pay-match-puppeteer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PUPPETEER_MODE=worker
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: bk-pay-match-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # SQLite daily backup sidecar
  backup:
    image: alpine:3
    container_name: bk-pay-match-backup
    restart: unless-stopped
    volumes:
      - app-data:/data:ro
      - app-backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'apk add --no-cache sqlite && while true; do
        sqlite3 /data/bkpay.db ".backup '"'"'/backups/bkpay_'$$(date +%Y%m%d_%H%M%S)'.db'"'"'";
        find /backups -name "*.db" -mtime +7 -delete 2>/dev/null;
        echo "[backup] $$(date) — done";
        sleep 86400;
      done'

volumes:
  app-data:
  app-logs:
  app-backups:
  redis-data:
