<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BK P2P - Price Chart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<style>
:root{--bg:#0c1017;--card:#1a2233;--text:#edf0f7;--text2:#8899aa;--green:#34d399;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24;--border:#2a3a4f;--accent:#6366f1}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border)}
header h1{font-size:18px;font-weight:700}
header a{color:var(--text2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--border);border-radius:6px}
header a:hover{color:var(--text);border-color:var(--text2)}
.controls{display:flex;gap:8px;flex-wrap:wrap;padding:16px 20px;align-items:center}
.btn-group{display:flex;gap:2px;background:var(--card);border-radius:8px;padding:2px;border:1px solid var(--border)}
.btn-group button{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-group button.active{background:var(--accent);color:#fff}
.btn-group button:hover:not(.active){color:var(--text)}
.exchange-toggles{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.exchange-toggles label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
.exchange-toggles label:hover{border-color:var(--text2)}
.exchange-toggles input{display:none}
.exchange-toggles label.checked{border-color:var(--accent);color:var(--text);background:rgba(99,102,241,.15)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.chart-wrap{padding:0 20px 20px;position:relative}
.chart-wrap canvas{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px}
.status-bar{display:flex;justify-content:space-between;padding:8px 20px;font-size:11px;color:var(--text2)}
.legend-custom{display:flex;gap:16px;padding:8px 20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
</style>
</head>
<body>
<header>
  <h1>BK P2P Chart</h1>
  <a href="/">Dashboard</a>
</header>

<div class="controls">
  <div class="btn-group" id="cryptoSel">
    <button class="active" data-v="USDT">USDT</button>
    <button data-v="BTC">BTC</button>
    <button data-v="ETH">ETH</button>
  </div>
  <div class="btn-group" id="rangeSel">
    <button data-v="1">1H</button>
    <button data-v="6">6H</button>
    <button class="active" data-v="24">24H</button>
    <button data-v="168">7D</button>
  </div>
  <div class="exchange-toggles" id="exToggles"></div>
</div>

<div class="chart-wrap">
  <canvas id="priceChart"></canvas>
</div>
<div class="status-bar">
  <span id="dataInfo">Loading...</span>
  <span id="nextUpdate">Auto-refresh: 60s</span>
</div>

<script>
const COLORS = {Bybit:'#f59e0b',Binance:'#f0b90b',OKX:'#00c6fb',HTX:'#2962ff'};
const LINE_STYLES = {buy:'solid',sell:'dashed',spot:'dotted'};

let crypto = 'USDT', hours = 24, chart = null, timer = null, countdown = 60;
let enabledExchanges = new Set();
let rawData = [];

function initBtnGroup(id, cb) {
  const el = document.getElementById(id);
  el.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      el.querySelector('.active')?.classList.remove('active');
      b.classList.add('active');
      cb(b.dataset.v);
    };
  });
}

initBtnGroup('cryptoSel', v => { crypto = v; fetchData(); });
initBtnGroup('rangeSel', v => { hours = +v; fetchData(); });

async function fetchData() {
  try {
    const r = await fetch(`/api/history/${crypto}?hours=${hours}`);
    const j = await r.json();
    if (j.success) { rawData = j.data; updateExchangeToggles(); renderChart(); }
    document.getElementById('dataInfo').textContent = `${rawData.length} data points | ${crypto} | ${hours}h`;
  } catch(e) { document.getElementById('dataInfo').textContent = 'Error loading data'; }
}

function updateExchangeToggles() {
  const exchanges = [...new Set(rawData.map(d => d.exchange))];
  if (enabledExchanges.size === 0) exchanges.forEach(e => enabledExchanges.add(e));
  const container = document.getElementById('exToggles');
  container.innerHTML = '';
  exchanges.forEach(ex => {
    const label = document.createElement('label');
    label.className = enabledExchanges.has(ex) ? 'checked' : '';
    const color = COLORS[ex] || '#888';
    label.innerHTML = `<span class="dot" style="background:${color}"></span><input type="checkbox" ${enabledExchanges.has(ex)?'checked':''}>${ex}`;
    label.querySelector('input').onchange = (e) => {
      if (e.target.checked) enabledExchanges.add(ex); else enabledExchanges.delete(ex);
      label.className = e.target.checked ? 'checked' : '';
      renderChart();
    };
    container.appendChild(label);
  });
}

function renderChart() {
  const filtered = rawData.filter(d => enabledExchanges.has(d.exchange));
  const exchanges = [...new Set(filtered.map(d => d.exchange))];
  const datasets = [];

  exchanges.forEach(ex => {
    const exData = filtered.filter(d => d.exchange === ex);
    const color = COLORS[ex] || '#888';
    // Buy line
    datasets.push({
      label: `${ex} Buy`,
      data: exData.filter(d=>d.bestBuy).map(d => ({x: d.timestamp, y: d.bestBuy})),
      borderColor: color, backgroundColor: color+'22',
      borderWidth: 2, pointRadius: 0, tension: 0.3, borderDash: []
    });
    // Sell line
    datasets.push({
      label: `${ex} Sell`,
      data: exData.filter(d=>d.bestSell).map(d => ({x: d.timestamp, y: d.bestSell})),
      borderColor: color, backgroundColor: 'transparent',
      borderWidth: 1.5, pointRadius: 0, tension: 0.3, borderDash: [5,3]
    });
  });

  // Spot price (from first exchange that has it)
  const spotData = filtered.filter(d => d.spot);
  if (spotData.length > 0) {
    const seen = new Set();
    const uniqueSpot = spotData.filter(d => { const k=d.timestamp; if(seen.has(k))return false; seen.add(k); return true; });
    datasets.push({
      label: 'Spot',
      data: uniqueSpot.map(d => ({x: d.timestamp, y: d.spot})),
      borderColor: '#a78bfa', backgroundColor: 'transparent',
      borderWidth: 2, pointRadius: 0, tension: 0.3, borderDash: [2,4]
    });
  }

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top', labels: { color: '#8899aa', usePointStyle: true, pointStyle: 'line', padding: 16, font: {size: 11} }},
        tooltip: { backgroundColor: '#1a2233ee', titleColor: '#edf0f7', bodyColor: '#ccc', borderColor: '#2a3a4f', borderWidth: 1,
          callbacks: { label: ctx => `${ctx.dataset.label}: ¥${ctx.parsed.y?.toLocaleString()}` }
        }
      },
      scales: {
        x: { type: 'time', time: { tooltipFormat: 'MM/dd HH:mm' }, grid: { color: '#1f2937' }, ticks: { color: '#667', maxTicksLimit: 8 }},
        y: { grid: { color: '#1f2937' }, ticks: { color: '#667', callback: v => '¥'+v.toLocaleString() }}
      }
    }
  });
  document.getElementById('priceChart').parentElement.style.height = Math.max(400, window.innerHeight - 200) + 'px';
}

// Auto-refresh
function startCountdown() {
  clearInterval(timer);
  countdown = 60;
  timer = setInterval(() => {
    countdown--;
    document.getElementById('nextUpdate').textContent = `Auto-refresh: ${countdown}s`;
    if (countdown <= 0) { fetchData(); countdown = 60; }
  }, 1000);
}

fetchData();
startCountdown();
</script>
</body>
</html>
