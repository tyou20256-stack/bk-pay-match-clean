<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BK P2P - Price Chart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<style>
:root{--bg:#0c1017;--card:#1a2233;--text:#edf0f7;--text2:#8899aa;--green:#34d399;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24;--border:#2a3a4f;--accent:#6366f1}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border)}
header h1{font-size:18px;font-weight:700}
header a{color:var(--text2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--border);border-radius:6px}
header a:hover{color:var(--text);border-color:var(--text2)}
.controls{display:flex;gap:8px;flex-wrap:wrap;padding:16px 20px;align-items:center}
.btn-group{display:flex;gap:2px;background:var(--card);border-radius:8px;padding:2px;border:1px solid var(--border)}
.btn-group button{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-group button.active{background:var(--accent);color:#fff}
.btn-group button:hover:not(.active){color:var(--text)}
.exchange-toggles{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.exchange-toggles label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
.exchange-toggles label:hover{border-color:var(--text2)}
.exchange-toggles input{display:none}
.exchange-toggles label.checked{border-color:var(--accent);color:var(--text);background:rgba(99,102,241,.15)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.chart-wrap{padding:0 20px 20px;position:relative}
.chart-wrap canvas{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px}
.status-bar{display:flex;justify-content:space-between;padding:8px 20px;font-size:11px;color:var(--text2)}
.legend-custom{display:flex;gap:16px;padding:8px 20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.analysis-section{padding:0 20px 20px}
.analysis-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.analysis-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ranking-table{width:100%;border-collapse:collapse;font-size:12px}
.ranking-table th{padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border)}
.ranking-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.ranking-table tr:hover td{background:rgba(255,255,255,.03)}
.rank-badge{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.rank-1{background:var(--yellow)}.rank-2{background:var(--text2)}.rank-3{background:#cd7f32}.rank-other{background:var(--border);color:var(--text2)}
.spread-stats{display:flex;gap:16px;padding-top:12px;flex-wrap:wrap}
.spread-stat{text-align:center;flex:1;min-width:100px}
.spread-stat-val{font-size:18px;font-weight:800;margin-bottom:2px}
.spread-stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.liquidity-grid{overflow-x:auto}
.liq-table{width:100%;border-collapse:collapse;font-size:11px}
.liq-table th{padding:6px 8px;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;border-bottom:1px solid var(--border)}
.liq-table td{padding:4px 8px;text-align:center;border-bottom:1px solid var(--border);position:relative}
.liq-cell{border-radius:4px;padding:4px 8px;font-weight:600;font-size:11px}
.heatmap-legend{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:12px}
.hl-label{font-size:10px;color:var(--text2)}
.hl-gradient{width:120px;height:10px;border-radius:4px;background:linear-gradient(to right,rgba(52,211,153,.1),rgba(52,211,153,.9))}
.score-bar{display:inline-block;height:6px;border-radius:3px;background:var(--green);vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<header>
  <h1>BK P2P Chart</h1>
  <a href="/">Dashboard</a>
</header>

<div class="controls">
  <div class="btn-group" id="cryptoSel">
    <button class="active" data-v="USDT">USDT</button>
    <button data-v="BTC">BTC</button>
    <button data-v="ETH">ETH</button>
  </div>
  <div class="btn-group" id="rangeSel">
    <button data-v="1">1H</button>
    <button data-v="6">6H</button>
    <button class="active" data-v="24">24H</button>
    <button data-v="168">7D</button>
  </div>
  <div class="exchange-toggles" id="exToggles"></div>
</div>

<div class="chart-wrap">
  <canvas id="priceChart"></canvas>
</div>
<div class="status-bar">
  <span id="dataInfo">Loading...</span>
  <span id="nextUpdate">Auto-refresh: 60s</span>
</div>

<!-- Spread Analysis -->
<div class="analysis-section">
  <div class="analysis-card">
    <div class="analysis-title">Spread Analysis (Buy - Sell)</div>
    <div class="chart-wrap" style="padding:0"><canvas id="spreadChart"></canvas></div>
    <div class="spread-stats" id="spreadStats"></div>
  </div>
</div>

<!-- Exchange Ranking -->
<div class="analysis-section">
  <div class="analysis-card">
    <div class="analysis-title">Exchange Ranking</div>
    <table class="ranking-table" id="rankingTable">
      <thead><tr><th>Rank</th><th>Exchange</th><th>Best Buy</th><th>Best Sell</th><th>Spread</th><th>Data Points</th><th>Score</th></tr></thead>
      <tbody id="rankingBody"><tr><td colspan="7" style="text-align:center;color:var(--text2)">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Liquidity Heatmap -->
<div class="analysis-section">
  <div class="analysis-card">
    <div class="analysis-title">Liquidity Heatmap (Orders by Exchange)</div>
    <div id="liquidityHeatmap" class="liquidity-grid"></div>
    <div class="heatmap-legend">
      <span class="hl-label">Low</span>
      <div class="hl-gradient"></div>
      <span class="hl-label">High</span>
    </div>
  </div>
</div>

<script src="chart-app.js"></script>
</body>
</html>
