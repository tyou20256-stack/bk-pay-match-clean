<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紹介ダッシュボード - PayMatch Referral Program</title>
  <meta name="description" content="PayMatch紹介プログラム。紹介コードで友達を招待し、取引ボリュームに応じた報酬を獲得。">
  <link rel="canonical" href="https://bkpay.app/referral.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="PayMatch 紹介プログラム">
  <meta property="og:description" content="友達を紹介してUSDT報酬を獲得。紹介コードを共有するだけ。">
  <meta property="og:url" content="https://bkpay.app/referral.html">
  <meta property="og:site_name" content="PayMatch">
  <meta property="og:image" content="https://bkpay.app/og-image.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PayMatch 紹介プログラム">
  <meta name="twitter:image" content="https://bkpay.app/og-image.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#34d399">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"PayMatch","item":"https://bkpay.app/"},{"@type":"ListItem","position":2,"name":"紹介プログラム","item":"https://bkpay.app/referral.html"}]}
  </script>
  <style>
    [data-theme="light"]{--bg:#f5f7fa;--card:#fff;--border:#e2e8f0;--text:#1a202c;--text2:#4a5568;--dim:#a0aec0;--accent:#10b981;--accent2:#059669;--danger:#dc2626;--warn:#d97706}
    :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--text2:#b0b8c8;--dim:#8a9ab5;--accent:#34d399;--accent2:#10b981;--danger:#ef4444;--warn:#f59e0b}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:480px;margin:0 auto;padding:20px 16px}
    nav{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;max-width:480px;margin:0 auto}
    .header{text-align:center;padding:20px 0}
    .header h1{font-size:20px;font-weight:700}
    .header h1 span{color:var(--accent)}
    .header p{color:var(--text2);font-size:13px;margin-top:4px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:600;margin-bottom:12px}
    label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
    input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
    input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--accent2);color:#fff}
    .btn-primary:hover{background:var(--accent)}
    .btn-secondary{background:var(--border);color:var(--text)}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0}
    .stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
    .stat-value{font-size:20px;font-weight:700;color:var(--accent)}
    .stat-label{font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
    .share-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
    .share-btns a,.share-btns button{padding:8px 16px;border-radius:6px;font-size:12px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
    .hidden{display:none!important}
    .msg{text-align:center;color:var(--text2);font-size:13px;padding:12px}
    .link-box{background:var(--bg);border:1px solid var(--accent);border-radius:8px;padding:12px;margin:12px 0;font-size:12px;word-break:break-all;color:var(--text2);text-align:center}
    .lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  </style>
</head>
<body>
<nav role="navigation" aria-label="サイトナビゲーション">
  <a href="/" style="color:var(--accent);text-decoration:none;font-weight:700;font-size:14px">Pay<span style="color:var(--text)">Match</span></a>
  <div style="display:flex;gap:8px;font-size:11px;align-items:center">
    <a href="/buy-usdt.html" style="color:var(--text2);text-decoration:none" data-i18n="p2p_title">USDT購入</a>
    <a href="/guide.html" style="color:var(--text2);text-decoration:none" data-i18n="ref_guide">ガイド</a>
    <button class="lang-btn" data-lang="ja" style="padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);font-size:10px;cursor:pointer">JA</button>
    <button class="lang-btn" data-lang="en" style="padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);font-size:10px;cursor:pointer">EN</button>
    <button class="lang-btn" data-lang="zh" style="padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);font-size:10px;cursor:pointer">ZH</button>
    <button class="lang-btn" data-lang="vi" style="padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);font-size:10px;cursor:pointer">VI</button>
    <button onclick="var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);this.textContent=t==='dark'?'&#9728;':'&#9774;'" style="background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text2);font-size:12px;cursor:pointer">&#9774;</button>
  </div>
</nav>
<main role="main">
<div class="container">
  <div class="header">
    <h1 data-i18n="ref_title">Referral <span>Dashboard</span></h1>
    <p data-i18n="ref_subtitle">友達を紹介して報酬を獲得</p>
  </div>

  <!-- Lookup -->
  <div class="card">
    <div class="card-title" data-i18n="ref_lookup_title">紹介コードで確認</div>
    <label for="refCodeInput" data-i18n="ref_code_label">紹介コード</label>
    <input type="text" id="refCodeInput" data-i18n-placeholder="ref_code_placeholder" placeholder="紹介コードを入力" aria-label="紹介コード">
    <button class="btn btn-primary" style="margin-top:12px" onclick="lookupStats()" aria-label="紹介統計を表示する" data-i18n="ref_show_stats">統計を表示</button>
  </div>

  <!-- Stats (hidden by default) -->
  <div id="statsPanel" class="card hidden" role="region" aria-label="紹介統計">
    <div class="card-title" data-i18n="ref_stats_title">紹介統計</div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="statConversions">0</div><div class="stat-label" data-i18n="ref_stat_conversions">紹介数</div></div>
      <div class="stat"><div class="stat-value" id="statVolume">0</div><div class="stat-label" data-i18n="ref_stat_volume">取引量(JPY)</div></div>
      <div class="stat"><div class="stat-value" id="statRewards">0</div><div class="stat-label" data-i18n="ref_stat_rewards">報酬(USDT)</div></div>
    </div>
    <div class="link-box" id="shareLink">--</div>
    <div class="share-btns">
      <button onclick="navigator.clipboard.writeText(document.getElementById('shareLink').textContent)" style="background:var(--card);border:1px solid var(--border);color:var(--text)" data-i18n="ref_copy">コピー</button>
      <a id="shareTwitter" href="#" target="_blank" rel="noopener" style="background:#1DA1F2;color:#fff">X/Twitter</a>
      <a id="shareTelegram" href="#" target="_blank" rel="noopener" style="background:#0088cc;color:#fff">Telegram</a>
      <a id="shareLine" href="#" target="_blank" rel="noopener" style="background:#06c755;color:#fff">LINE</a>
    </div>
  </div>

  <div id="statsMsg" class="msg hidden"></div>

  <!-- Generate -->
  <div class="card">
    <div class="card-title" data-i18n="ref_generate_title">新しい紹介コードを生成</div>
    <label for="referrerIdInput" data-i18n="ref_buyer_id_label">あなたのBuyer ID</label>
    <input type="text" id="referrerIdInput" data-i18n-placeholder="ref_buyer_id_placeholder" placeholder="Buyer IDを入力" aria-label="Buyer ID">
    <button class="btn btn-secondary" style="margin-top:12px" onclick="generateCode()" aria-label="紹介コードを生成する" data-i18n="ref_generate_btn">コード生成</button>
    <div id="genResult" class="msg hidden"></div>
  </div>
</div>
</main>

<footer style="max-width:480px;margin:16px auto;padding:0 16px;font-size:10px;color:var(--dim);text-align:center">
  <a href="/buy-usdt.html" style="color:var(--dim)" data-i18n="p2p_title">USDT購入</a> ·
  <a href="/guide.html" style="color:var(--dim)" data-i18n="ref_guide">ガイド</a> ·
  <a href="/terms.html" style="color:var(--dim)" data-i18n="ref_terms">利用規約</a> ·
  <a href="/privacy.html" style="color:var(--dim)" data-i18n="ref_privacy">プライバシー</a>
</footer>

<script src="/i18n.js"></script>
<script>
var API = '';
function lookupStats() {
  var code = document.getElementById('refCodeInput').value.trim();
  if (!code) return;
  document.getElementById('statsPanel').classList.add('hidden');
  document.getElementById('statsMsg').classList.remove('hidden');
  document.getElementById('statsMsg').textContent = t('ref_loading');
  fetch(API + '/api/p2p-buy/referral/' + encodeURIComponent(code))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        document.getElementById('statConversions').textContent = d.conversions || 0;
        document.getElementById('statVolume').textContent = (d.volume || 0).toLocaleString();
        document.getElementById('statRewards').textContent = (d.rewards || 0).toFixed(2);
        var shareUrl = location.origin + '/buy-usdt.html?ref=' + encodeURIComponent(code);
        document.getElementById('shareLink').textContent = shareUrl;
        var text = 'PayMatchでUSDTを最安レートで購入！';
        document.getElementById('shareTwitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(shareUrl);
        document.getElementById('shareTelegram').href = 'https://t.me/share/url?url=' + encodeURIComponent(shareUrl) + '&text=' + encodeURIComponent(text);
        document.getElementById('shareLine').href = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(shareUrl);
        document.getElementById('statsPanel').classList.remove('hidden');
        document.getElementById('statsMsg').classList.add('hidden');
      } else {
        document.getElementById('statsMsg').textContent = d.error || t('ref_not_found');
      }
    })
    .catch(function() {
      document.getElementById('statsMsg').textContent = t('ref_network_error');
    });
}

function generateCode() {
  var referrerId = document.getElementById('referrerIdInput').value.trim();
  if (!referrerId) return;
  var genResult = document.getElementById('genResult');
  genResult.classList.remove('hidden');
  genResult.textContent = t('ref_generating');
  fetch(API + '/api/p2p-buy/referral/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ referrerId: referrerId, type: 'web' })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        genResult.textContent = t('ref_code_prefix') + (d.code || '') + ' | ' + (d.shareUrl || '');
        document.getElementById('refCodeInput').value = d.code || '';
      } else {
        genResult.textContent = d.error || t('ref_generate_fail');
      }
    })
    .catch(function() {
      genResult.textContent = t('ref_network_error');
    });
}
</script>
<script>
(function(){var th=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',th);})();
document.querySelectorAll('.lang-btn').forEach(function(btn){btn.addEventListener('click',function(){setLanguage(this.dataset.lang);});});
</script>
</body>
</html>
