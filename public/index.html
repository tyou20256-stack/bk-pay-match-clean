<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BK P2P Aggregator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>BK P2P Aggregator</h1>
      <span class="subtitle">P2P Exchange Rate Monitor</span>
    </div>
    <div class="header-right">
      <div class="spot-prices" id="spotPrices"></div>
      <div class="update-info">
        <span id="countdown">--</span>s
        <button id="refreshBtn" onclick="refresh()">Refresh</button>
      </div>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Light</button>
    </div>
  </header>

  <nav class="crypto-tabs">
    <button class="tab active" data-crypto="USDT">USDT / JPY</button>
    <button class="tab" data-crypto="BTC">BTC / JPY</button>
    <button class="tab" data-crypto="ETH">ETH / JPY</button>
  </nav>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Payment</label>
      <div id="paymentFilters" class="filter-chips"></div>
    </div>
    <div class="filter-group">
      <label>Exchange</label>
      <div id="exchangeFilters" class="filter-chips"></div>
    </div>
    <div class="filter-group">
      <label>Amount (JPY)</label>
      <input type="number" id="filterAmount" placeholder="e.g. 100000" class="filter-input">
    </div>
    <div class="filter-group">
      <label>Completion</label>
      <select id="filterCompletion" class="filter-select">
        <option value="0">All</option>
        <option value="80">80%+</option>
        <option value="90">90%+</option>
        <option value="95" selected>95%+</option>
        <option value="98">98%+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Min. Stock</label>
      <select id="filterMinAvail" class="filter-select">
        <option value="0">All</option>
        <option value="100">100+</option>
        <option value="1000">1,000+</option>
        <option value="5000">5,000+</option>
        <option value="10000">10,000+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filterOnline" class="filter-select">
        <option value="all">All</option>
        <option value="online">Online Only</option>
      </select>
    </div>
    <button class="filter-reset" onclick="resetFilters()">Reset</button>
    <div class="filter-count" id="filterCount"></div>
  </div>

  <main>
    <!-- Arbitrage Alert -->
    <div id="arbAlert" class="arb-alert hidden">
      <div class="arb-label">ARBITRAGE DETECTED</div>
      <div id="arbContent"></div>
    </div>

    <!-- Summary Row -->
    <div class="summary-row">
      <div class="summary-card buy">
        <div class="summary-label">BEST BUY</div>
        <div class="summary-price" id="bestBuyPrice">--</div>
        <div class="summary-detail" id="bestBuyExchange">--</div>
      </div>
      <div class="summary-card spread-card">
        <div class="spread-grid" id="spreadBars"></div>
      </div>
      <div class="summary-card sell">
        <div class="summary-label">BEST SELL</div>
        <div class="summary-price" id="bestSellPrice">--</div>
        <div class="summary-detail" id="bestSellExchange">--</div>
      </div>
    </div>

    <!-- Two Column Order Book -->
    <div class="orderbook">
      <div class="orderbook-side">
        <div class="orderbook-header buy-header">
          <span>BUY &mdash; JPY to <span class="current-crypto">USDT</span></span>
          <span class="order-count" id="buyCount"></span>
        </div>
        <div class="table-wrapper">
          <table id="buyTable">
            <thead>
              <tr>
                <th>#</th><th>Exch</th><th>Rate</th><th>Prem</th>
                <th>Avail</th><th>Limit</th><th>Merchant</th><th>Comp</th><th>Pay</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="orderbook-side">
        <div class="orderbook-header sell-header">
          <span>SELL &mdash; <span class="current-crypto">USDT</span> to JPY</span>
          <span class="order-count" id="sellCount"></span>
        </div>
        <div class="table-wrapper">
          <table id="sellTable">
            <thead>
              <tr>
                <th>#</th><th>Exch</th><th>Rate</th><th>Prem</th>
                <th>Avail</th><th>Limit</th><th>Merchant</th><th>Comp</th><th>Pay</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>BK P2P Aggregator v1.2 &mdash; Bybit / Binance / OKX &mdash; Powered by ccxt</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
