<!DOCTYPE html>
<html lang="ja" data-theme="dark" data-lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BK P2P Aggregator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>BK P2P Aggregator</h1>
      <span class="subtitle" data-i18n="subtitle">P2P取引所 横断レート監視</span>
    </div>
    <div class="header-right">
      <div class="spot-prices" id="spotPrices"></div>
      <div class="update-info">
        <span id="countdown">--</span>s
        <button id="refreshBtn" onclick="refresh()" data-i18n="refresh">更新</button>
      </div>
      <button class="toggle-btn" id="langToggle" onclick="toggleLang()">EN</button>
      <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">Light</button>
    </div>
  </header>

  <nav class="crypto-tabs">
    <button class="tab active" data-crypto="USDT">USDT / JPY</button>
    <button class="tab" data-crypto="BTC">BTC / JPY</button>
    <button class="tab" data-crypto="ETH">ETH / JPY</button>
  </nav>

  <div class="filter-bar">
    <div class="filter-group">
      <label data-i18n="f_payment">決済方法</label>
      <div id="paymentFilters" class="filter-chips"></div>
    </div>
    <div class="filter-group">
      <label data-i18n="f_exchange">取引所</label>
      <div id="exchangeFilters" class="filter-chips"></div>
    </div>
    <div class="filter-group">
      <label data-i18n="f_amount">金額 (JPY)</label>
      <input type="number" id="filterAmount" placeholder="例: 100000" class="filter-input">
    </div>
    <div class="filter-group">
      <label data-i18n="f_completion">完了率</label>
      <select id="filterCompletion" class="filter-select">
        <option value="0" data-i18n="all">全て</option>
        <option value="80">80%+</option>
        <option value="90">90%+</option>
        <option value="95" selected>95%+</option>
        <option value="98">98%+</option>
      </select>
    </div>
    <div class="filter-group">
      <label data-i18n="f_stock">最低在庫</label>
      <select id="filterMinAvail" class="filter-select">
        <option value="0" data-i18n="all">全て</option>
        <option value="100">100+</option>
        <option value="1000">1,000+</option>
        <option value="5000">5,000+</option>
        <option value="10000">10,000+</option>
      </select>
    </div>
    <div class="filter-group">
      <label data-i18n="f_status">状態</label>
      <select id="filterOnline" class="filter-select">
        <option value="all" data-i18n="all">全て</option>
        <option value="online" data-i18n="online_only">オンラインのみ</option>
      </select>
    </div>
    <button class="filter-reset" onclick="resetFilters()" data-i18n="reset">リセット</button>
    <div class="filter-count" id="filterCount"></div>
  </div>

  <main>
    <div id="arbAlert" class="arb-alert hidden">
      <div class="arb-label" data-i18n="arb_detected">裁定機会あり</div>
      <div id="arbContent"></div>
    </div>

    <div class="summary-row">
      <div class="summary-card buy">
        <div class="summary-label" data-i18n="best_buy">最安値（購入）</div>
        <div class="summary-price" id="bestBuyPrice">--</div>
        <div class="summary-detail" id="bestBuyExchange">--</div>
      </div>
      <div class="summary-card spread-card">
        <div class="spread-grid" id="spreadBars"></div>
      </div>
      <div class="summary-card sell">
        <div class="summary-label" data-i18n="best_sell">最高値（売却）</div>
        <div class="summary-price" id="bestSellPrice">--</div>
        <div class="summary-detail" id="bestSellExchange">--</div>
      </div>
    </div>

    <div class="orderbook">
      <div class="orderbook-side">
        <div class="orderbook-header buy-header">
          <span class="ob-title" id="buyTitle">円で購入 (JPY → <span class="current-crypto">USDT</span>)</span>
          <span class="order-count" id="buyCount"></span>
        </div>
        <div class="ob-desc buy-desc" id="buyDesc">日本円を支払って暗号資産を受け取る</div>
        <div class="table-wrapper">
          <table id="buyTable">
            <thead>
              <tr>
                <th>#</th><th data-i18n="th_exchange">取引所</th><th data-i18n="th_rate">レート</th><th data-i18n="th_premium">乖離率</th>
                <th data-i18n="th_avail">在庫</th><th data-i18n="th_limit">取引範囲</th><th data-i18n="th_merchant">業者</th><th data-i18n="th_comp">完了率</th><th data-i18n="th_pay">決済</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="orderbook-side">
        <div class="orderbook-header sell-header">
          <span class="ob-title" id="sellTitle">円に換金 (<span class="current-crypto">USDT</span> → JPY)</span>
          <span class="order-count" id="sellCount"></span>
        </div>
        <div class="ob-desc sell-desc" id="sellDesc">暗号資産を支払って日本円を受け取る</div>
        <div class="table-wrapper">
          <table id="sellTable">
            <thead>
              <tr>
                <th>#</th><th data-i18n="th_exchange">取引所</th><th data-i18n="th_rate">レート</th><th data-i18n="th_premium">乖離率</th>
                <th data-i18n="th_avail">在庫</th><th data-i18n="th_limit">取引範囲</th><th data-i18n="th_merchant">業者</th><th data-i18n="th_comp">完了率</th><th data-i18n="th_pay">決済</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>BK P2P Aggregator v1.3 &mdash; Bybit / Binance / OKX &mdash; Powered by ccxt</span>
  </footer>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
