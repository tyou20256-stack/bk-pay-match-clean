  <!-- Exchange badges -->
  <rect x="340" y="440" width="100" height="32" rx="6" fill="#1a2233" stroke="#243049" stroke-width="1"/>
  <text x="390" y="462" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#f7a600">Bybit</text>
  <rect x="460" y="440" width="100" height="32" rx="6" fill="#1a2233" stroke="#243049" stroke-width="1"/>
  <text x="510" y="462" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#f0b90b">Binance</text>
