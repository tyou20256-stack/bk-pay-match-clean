  <text x="620" y="462" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#ffffff">OKX</text>
  <rect x="680" y="440" width="100" height="32" rx="6" fill="#1a2233" stroke="#34d399" stroke-width="1"/>
  <text x="730" y="462" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#34d399">TruPay</text>
