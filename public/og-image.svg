  <line x1="100" y1="100" x2="180" y2="70" stroke="#34d399" stroke-width="1" opacity="0.1"/>
  <line x1="100" y1="100" x2="140" y2="140" stroke="#34d399" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="120" r="5" fill="#34d399" opacity="0.2"/>
  <circle cx="1120" cy="85" r="4" fill="#34d399" opacity="0.15"/>
  <circle cx="1090" cy="155" r="4" fill="#34d399" opacity="0.15"/>
  <line x1="1050" y1="120" x2="1120" y2="85" stroke="#34d399" stroke-width="1" opacity="0.1"/>
  <line x1="1050" y1="120" x2="1090" y2="155" stroke="#34d399" stroke-width="1" opacity="0.1"/>
  <!-- Chart decoration -->
  <polyline points="80,480 160,450 240,470 320,410 400,430 480,380 560,400 640,350 720,370 800,320 880,340 960,300 1040,320 1120,280"
