      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="oacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#obg)"/>
  <!-- Grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#34d399" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#34d399" stroke-width="0.5" opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#34d399" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#34d399" stroke-width="0.5" opacity="0.06"/>
  <!-- Network dots -->
  <circle cx="100" cy="100" r="5" fill="#34d399" opacity="0.2"/>
  <circle cx="180" cy="70" r="4" fill="#34d399" opacity="0.15"/>
