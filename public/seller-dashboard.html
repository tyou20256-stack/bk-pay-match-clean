<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Match — セラーダッシュボード</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e8eaf0;
      --dim: #6b7280; --green: #22c55e; --green-soft: rgba(34,197,94,.1);
      --yellow: #eab308; --red: #ef4444; --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .logo { font-size: 18px; font-weight: 700; color: var(--green); }
    .logo span { color: var(--text); }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
    .btn-green { background: var(--green); color: #000; }
    .btn-green:hover:not(:disabled) { opacity: .85; }
    .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
    main { padding: 24px 20px; max-width: 900px; margin: 0 auto; }
    .cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
    .stat-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.green { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: var(--dim); font-size: 11px; font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .empty { text-align: center; color: var(--dim); padding: 32px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-completed { background: rgba(34,197,94,.15); color: var(--green); }
    .badge-confirming { background: rgba(234,179,8,.15); color: var(--yellow); }
    .badge-cancelled,.badge-expired { background: rgba(107,114,128,.15); color: var(--dim); }
    .badge-pending { background: rgba(59,130,246,.15); color: var(--blue); }
    .badge-other { background: rgba(107,114,128,.15); color: var(--dim); }
    input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; }
    input:focus { border-color: var(--green); }
    label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
    .msg-error { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.3); border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .url-box { font-family: monospace; font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; word-break: break-all; color: var(--dim); margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- Login View -->
  <div id="loginView" style="display:flex;flex-direction:column;align-items:center;padding:40px 16px">
    <div class="logo" style="margin-bottom:32px">Pay <span>Match</span></div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:380px">
      <div style="font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:20px">セラーログイン</div>
      <label>メールアドレス</label>
      <input type="email" id="loginEmail" placeholder="seller@example.com" autocomplete="email">
      <label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
      <button class="btn btn-green" id="loginBtn" style="width:100%;padding:12px;font-size:15px;margin-top:4px">ログイン</button>
      <div id="loginMsg" style="display:none" class="msg msg-error"></div>
    </div>
    <a href="/seller-register.html" style="color:var(--green);text-decoration:none;font-size:13px;margin-top:16px">新規登録はこちら →</a>
  </div>

  <!-- Dashboard View -->
  <div id="dashboardView" style="display:none">
    <header>
      <div class="logo">Pay <span>Match</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="sellerName" style="font-size:13px;color:var(--dim)"></span>
        <button class="btn btn-outline" id="logoutBtn">ログアウト</button>
      </div>
    </header>

    <main>
      <!-- Stat Cards -->
      <div class="cards-row">
        <div class="stat-card">
          <div class="stat-label">利用可能残高</div>
          <div class="stat-value green" id="statAvail">--</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px">USDT</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">ロック中</div>
          <div class="stat-value yellow" id="statLocked">--</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px">USDT</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">累計取引数</div>
          <div class="stat-value" id="statTrades">--</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px">件</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">ステータス</div>
          <div class="stat-value" id="statStatus" style="font-size:16px;margin-top:4px">--</div>
        </div>
      </div>

      <!-- Confirm URL Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">確認ページ URL</div>
          <button class="btn btn-outline" id="copyUrlBtn">URLをコピー</button>
        </div>
        <div class="url-box" id="confirmUrlBox">--</div>
        <div style="font-size:12px;color:var(--dim);line-height:1.6">
          バイヤーが振込完了を報告した際、このURLから入金確認を行ってください。<br>
          ※ URLの <code style="color:var(--yellow)">ORDER_ID</code> 部分は実際の注文IDに置換されます（Telegram通知に含まれます）。
        </div>
      </div>

      <!-- Orders Table -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">注文履歴（直近50件）</div>
          <button class="btn btn-outline" id="refreshBtn">更新</button>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>注文ID</th>
                <th>金額 (JPY)</th>
                <th>USDT</th>
                <th>支払方法</th>
                <th>ステータス</th>
                <th>作成日時</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr><td colspan="6" class="empty">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="seller-dashboard-app.js"></script>
</body>
</html>
