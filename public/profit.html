<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Match - 損益ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
  <link rel="stylesheet" href="profit.css">
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="logo">Pay <span>Match</span> 損益ダッシュボード</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn">D</button>
    </div>
  </div>
  <nav class="admin-nav">
    <a class="nav-btn" href="/admin.html" style="text-decoration:none">← 管理画面</a>
    <span class="nav-sep"></span>
    <a class="nav-btn" href="/rules.html" style="text-decoration:none">ルール</a>
    <a class="nav-btn" href="/simulator.html" style="text-decoration:none">シミュレーター</a>
    <a class="nav-btn" href="/prediction.html" style="text-decoration:none">予測</a>
    <a class="nav-btn active" href="/profit.html" style="text-decoration:none">損益</a>
  </nav>

  <div class="container">
    <!-- Section 1: Today's Summary -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val green" id="todayProfit">--</div>
        <div class="stat-label">本日の純利益</div>
      </div>
      <div class="stat-card">
        <div class="stat-val yellow" id="goalPct">--%</div>
        <div class="stat-label">目標達成率</div>
      </div>
      <div class="stat-card">
        <div class="stat-val blue" id="todayOrders">--</div>
        <div class="stat-label">注文数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="avgProfit">--</div>
        <div class="stat-label">平均利益/件</div>
      </div>
    </div>

    <!-- Section 2 & 3: Gauge + Hourly Chart -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">目標達成ゲージ</div>
        <div class="gauge-wrap">
          <div class="gauge">
            <svg viewBox="0 0 200 200" width="200" height="200">
              <circle class="gauge-bg" cx="100" cy="100" r="85"/>
              <circle class="gauge-fill" id="gaugeFill" cx="100" cy="100" r="85"
                stroke-dasharray="534" stroke-dashoffset="534"/>
            </svg>
            <div class="gauge-center">
              <div class="gauge-pct" id="gaugePct">0%</div>
              <div class="gauge-sub" id="gaugeSub">-- / --</div>
            </div>
          </div>
          <div class="goal-edit">
            <span style="font-size:11px;color:var(--dim)">日次目標:</span>
            <input type="number" class="goal-input" id="goalInput" value="50000" step="1000">
            <button class="btn btn-green" id="saveGoalBtn">設定</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">本日の時間別利益</div>
        <canvas id="hourlyChart" height="220"></canvas>
      </div>
    </div>

    <!-- Section 4: 7-day trend -->
    <div class="card">
      <div class="card-title">7日間トレンド <span class="trend-arrow" id="trendArrow"></span></div>
      <canvas id="trendChart" height="100"></canvas>
    </div>

    <!-- Section 5: Breakdown -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">暗号通貨別利益</div>
        <canvas id="cryptoPie" height="200"></canvas>
      </div>
      <div class="card">
        <div class="card-title">利益内訳</div>
        <table>
          <thead><tr><th>期間</th><th>スプレッド利益</th><th>手数料利益</th><th>合計</th></tr></thead>
          <tbody id="breakdownBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Section 6: Monthly Heatmap -->
    <div class="card">
      <div class="card-title">
        月間ヒートマップ
        <div style="margin-left:auto;display:flex;gap:4px">
          <button class="btn btn-outline" id="prevMonthBtn" style="padding:4px 8px">&#9664;</button>
          <span id="heatmapMonth" style="font-size:12px;min-width:80px;text-align:center;line-height:26px"></span>
          <button class="btn btn-outline" id="nextMonthBtn" style="padding:4px 8px">&#9654;</button>
        </div>
      </div>
      <div class="heatmap" id="heatmap"></div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="profit-app.js"></script>
  <script src="chat-widget.js"></script>
</body>
</html>
