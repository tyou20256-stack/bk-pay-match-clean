<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Match - ログイン</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    [data-theme="dark"]{--bg:#0c1017;--card:#1a2233;--border:#243049;--text:#edf0f7;--text2:#a0aec0;--dim:#5a6a85;--green:#34d399;--green2:#10b981;--green-soft:rgba(52,211,153,.1);--red:#f87171;--input-bg:#0f1520}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .login-logo{text-align:center;font-size:20px;font-weight:800;margin-bottom:24px}.login-logo span{color:var(--green)}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .form-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;font-family:inherit}
    .form-input:focus{outline:none;border-color:var(--green)}
    .btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--green);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
    .btn:hover{background:var(--green2)}
    .error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Pay <span>Match</span> Admin</div>
    <div class="form-group">
      <label class="form-label">ユーザー名</label>
      <input class="form-input" id="username" placeholder="admin" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">パスワード</label>
      <input class="form-input" id="password" type="password" placeholder="********">
    </div>
    <button class="btn" onclick="login()">ログイン</button>
    <div class="error" id="error">ユーザー名またはパスワードが正しくありません</div>
  </div>
  <script>
    document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')login();});
    async function login(){
      var u=document.getElementById('username').value,p=document.getElementById('password').value;
      if(!u||!p)return;
      var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      var d=await r.json();
      if(d.success){window.location.href='/admin.html';}
      else{document.getElementById('error').style.display='block';}
    }
  </script>
</body>
</html>
