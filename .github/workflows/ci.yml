name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm audit --audit-level=critical
      - name: Lint
        # Strict: 0 errors, 0 warnings. The eslint.config.js rules were
        # tuned in c7af17a to silence the ESLint v9 migration noise, and
        # the remaining dead-code warnings were fixed in the same commit.
        run: npx eslint src/ --max-warnings 0
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Unit tests with coverage
        # Excludes tests that require a running HTTP server on :3003
        # (those run later in the "Integration tests" step which boots the
        # server first). Pure unit tests only here.
        run: |
          npx vitest run --coverage \
            --exclude='**/node_modules/**' \
            --exclude='tests/api.test.ts' \
            --exclude='tests/api-security.test.ts' \
            --exclude='tests/e2e.test.ts' \
            --exclude='tests/integration.test.ts' \
            --exclude='tests/extended.test.ts' \
            --exclude='tests/phase3-5.test.ts'
        env:
          NODE_ENV: test
          BK_ENC_KEY: test_key_0000000000000000000000000000000000000000000000
          # Matches the hard-coded password in api.test.ts + phase3-5.test.ts
          # TODO(test-refactor): make all tests read from env var instead of
          # hard-coding 'bkpay2026'.
          BK_ADMIN_PASSWORD: bkpay2026
      - name: TypeScript build
        run: npm run build
      - name: Integration tests
        # All pre-existing test drift has been resolved:
        #   - Auth: Bearer token in body + 127.0.0.1 + NODE_ENV=test IP skip
        #   - Order schema: POST /api/orders now sends customerWalletAddress
        #     + crypto in addition to amount + payMethod
        #   - Admin password: CI env matches the hard-coded 'bkpay2026' fixture
        #   - Public endpoint assertions: /api/orders list is documented as
        #     open (no authRequired middleware)
        run: |
          node dist/index.js &
          SERVER_PID=$!
          sleep 8
          TEST_URL=http://127.0.0.1:3003 npx vitest run \
            tests/api-security.test.ts \
            tests/e2e.test.ts \
            tests/api.test.ts \
            tests/integration.test.ts \
            tests/extended.test.ts \
            tests/phase3-5.test.ts
          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $TEST_EXIT
        env:
          NODE_ENV: test
          BK_ENC_KEY: test_key_0000000000000000000000000000000000000000000000
          # Matches the hard-coded password in api.test.ts + phase3-5.test.ts
          # TODO(test-refactor): make all tests read from env var instead of
          # hard-coding 'bkpay2026'.
          BK_ADMIN_PASSWORD: bkpay2026
          PORT: 3003

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: bk-pay-match:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
